# Server
server.port=8080

spring.application.name=customer-management

# DataSource
spring.datasource.url=jdbc:mariadb://localhost:3306/customer_mgmt?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# File upload - support up to 1M rows Excel (~200MB)
spring.servlet.multipart.max-file-size=250MB
spring.servlet.multipart.max-request-size=250MB

# Async bulk processing
bulk.processing.chunk-size=500
bulk.processing.thread-pool-size=4

# Logging
logging.level.com.customermgmt=INFO
logging.level.org.hibernate.SQL=WARN
